spring:
  application:
    name: lunch-order
  datasource:
    url: jdbc:h2:mem:lunch;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  h2:
    console:
      enabled: true
      path: /h2

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health, info
