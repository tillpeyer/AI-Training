# DO NOT EDIT -- overwritten on every update.
#
# Default customization values for bmad-elcai-story-loop.
# Override in _bmad/custom/bmad-elcai-story-loop.toml or
# _bmad/custom/bmad-elcai-story-loop.user.toml.
#
# Merge rules:
# - Strings replace the default.
# - Lists append to the default list.
# - Tables merge key by key.

[workflow]

# Extra instructions to run before config is loaded.
activation_steps_prepend = []

# Extra instructions to run after config is loaded and before Step 1.
activation_steps_append = []

# Facts kept in context for the whole run.
# Entries are literal text or file references prefixed with "file:".
persistent_facts = [
  "file:{project-root}/**/project-context.md",
]

# Maximum times `bmad-dev-auto` will be invoked before HALTing with
# iterations-exhausted. Each invocation is one full dev-auto pass
# (clarify → plan → implement → review). Set higher only for stories
# where you expect multiple review rounds.
max_iterations = 3

# Branch the PR is opened against.
target_branch = "main"

# Instructions to run after a successful terminal state. Optional.
on_complete = ""
